name: telegram-fetcher

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install playwright requests jdatetime

      - name: Install Chromium for Playwright
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run archiver
        run: python .github/script/fetch_telegram_pw.py

      - name: Commit and push changes
        env:
          BRANCH: ${{ github.ref_name }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ------------- CONFIGURE GIT -------------
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
      
          # ------------- STAGE ALL CHANGES ---------
          # (Adjust the path as needed for each workflow – e.g., '.' or specific folders)
          git add .
      
          # ------------- NOTHING TO COMMIT? --------
          if git diff --staged --quiet; then
            echo "✅ No changes to commit."
            exit 0
          fi
      
          git commit -m "chore: update generated files [skip ci]"
      
          # ------------- AUTHENTICATED REMOTE ------
          REPO="${{ github.repository }}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
      
          # ------------- PUSH WITH RETRIES ---------
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "🚀 Push attempt $i of $RETRIES..."
            git pull --rebase --autostash origin "$BRANCH" || true
            if git push origin "$BRANCH"; then
              echo "✅ Push succeeded."
              break
            else
              echo "❌ Push failed."
              if [ $i -lt $RETRIES ]; then
                sleep 3
              else
                echo "::error::All push attempts failed. If this is a forked repository, the GITHUB_TOKEN does not have write permission. Use a Personal Access Token (PAT)."
                exit 1
              fi
            fi
          done
      
          # ------------- VERIFICATION ---------------
          echo "🔍 Verifying remote branch state..."
          git fetch origin "$BRANCH"
          if git diff --quiet "origin/$BRANCH" HEAD; then
            echo "✅ Remote branch matches local – push confirmed."
          else
            echo "❌ Remote branch differs from local. The push might have been rejected (common in forks)."
            echo "::error::Verification failed. Repository is a fork? GITHUB_TOKEN cannot write. Add a PAT secret."
            exit 1
          fi
