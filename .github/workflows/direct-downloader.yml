name: direct-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more Direct Download URLs.
          Separate by commas, spaces, or newlines.
        required: true

permissions:
  contents: write

jobs:
  actions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2

      - name: Parse URLs
        id: parse
        run: |
          URLS_INPUT="${{ github.event.inputs.url }}"
          # Replace commas and newlines with spaces, then clean up
          URLS=$(echo "$URLS_INPUT" | tr ',' ' ' | tr '\n' ' ' | tr -s ' ' | sed 's/^ *//;s/ *$//')
          if [ -z "$URLS" ]; then
            echo "No URLs provided." >&2
            exit 1
          fi
          echo "$URLS" | tr ' ' '\n' > urls.txt
          echo "URLs to download:"
          cat urls.txt
          NUM=$(wc -l < urls.txt)
          echo "NUM_URLS=$NUM" >> $GITHUB_OUTPUT

      - name: Download and zip each file
        run: |
          mkdir -p direct
          index=0
          while IFS= read -r url; do
            index=$((index + 1))
            echo "----------------------------------------"
            echo "Processing URL $index: $url"

            # Download into a unique temporary folder for this URL
            DL_DIR="dl_$index"
            mkdir -p "$DL_DIR"
            aria2c -x 16 -s 16 -d "$DL_DIR" --console-log-level=warn --summary-interval=10 "$url"

            # Get the downloaded filename (there will be exactly one file)
            DL_FILE=$(ls -1 "$DL_DIR" | head -n1)
            if [ -z "$DL_FILE" ]; then
              echo "Download failed or no file found for $url"
              rm -rf "$DL_DIR"
              continue
            fi
            echo "Downloaded: $DL_FILE"

            # Generate a random 5-letter string (lowercase a-z)
            RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)

            # Append the random string before the final .zip extension
            ZIP_BASE="${DL_FILE}_${RAND5}"
            ZIP_NAME="${ZIP_BASE}.zip"
            echo "ZIP output: $ZIP_NAME"

            # Create temporary folder to hold only this file
            TMPZIP="tmpzip_$index"
            mkdir -p "$TMPZIP"
            cp "$DL_DIR/$DL_FILE" "$TMPZIP/"

            # Create split zip with the file at the archive root
            (cd "$TMPZIP" && zip -s 99m "../direct/${ZIP_NAME}" "$DL_FILE")

            # Cleanup
            rm -rf "$DL_DIR" "$TMPZIP"
          done < urls.txt

      - name: Commit and push changes
        env:
          BRANCH: ${{ github.ref_name }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ------------- CONFIGURE GIT -------------
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
      
          # ------------- STAGE ALL CHANGES ---------
          # (Adjust the path as needed for each workflow – e.g., '.' or specific folders)
          git add .
      
          # ------------- NOTHING TO COMMIT? --------
          if git diff --staged --quiet; then
            echo "✅ No changes to commit."
            exit 0
          fi
      
          git commit -m "chore: update generated files [skip ci]"
      
          # ------------- AUTHENTICATED REMOTE ------
          REPO="${{ github.repository }}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}.git"
      
          # ------------- PUSH WITH RETRIES ---------
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "🚀 Push attempt $i of $RETRIES..."
            git pull --rebase --autostash origin "$BRANCH" || true
            if git push origin "$BRANCH"; then
              echo "✅ Push succeeded."
              break
            else
              echo "❌ Push failed."
              if [ $i -lt $RETRIES ]; then
                sleep 3
              else
                echo "::error::All push attempts failed. If this is a forked repository, the GITHUB_TOKEN does not have write permission. Use a Personal Access Token (PAT)."
                exit 1
              fi
            fi
          done
      
          # ------------- VERIFICATION ---------------
          echo "🔍 Verifying remote branch state..."
          git fetch origin "$BRANCH"
          if git diff --quiet "origin/$BRANCH" HEAD; then
            echo "✅ Remote branch matches local – push confirmed."
          else
            echo "❌ Remote branch differs from local. The push might have been rejected (common in forks)."
            echo "::error::Verification failed. Repository is a fork? GITHUB_TOKEN cannot write. Add a PAT secret."
            exit 1
          fi
